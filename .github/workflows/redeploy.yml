name: Redeploy

on:
    schedule:
        - cron: '0 0 * * *'
    workflow_dispatch:

jobs:
    redeploy:
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Install Vercel CLI
              run: npm install --global vercel@latest
            - name: Re-deploy the last deployment
              run: |
                vercel teams switch vantage-sh --token=${{ secrets.VERCEL_TOKEN }}
                vercel redeploy https://models-vantage-sh.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
